version: '3.8'

services:
  backend:
    build:
      context: ./pdf-summarizer-backend
      dockerfile: Dockerfile
    container_name: pdf_backend
    ports:
      - "8888:8888"
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  - ./db_data:/workspace/db_data
  - ./uploaded_pdfs:/workspace/uploaded_pdfs
    restart: always