services:
  pdf_backend:
    build:
      context: ./pdf-summarizer-backend
      dockerfile: Dockerfile
    container_name: pdf_backend
    ports:
      - "8888:8888"
    environment:
      - OLLAMA_API_URL=http://host.docker.internal:11434/api/chat
      - QDRANT_HOST=qdrant_service
      - QDRANT_PORT=6333
    volumes:
      - ./pdf-summarizer-backend/app:/workspace/app
      - ./db_data:/workspace/db_data
      - ./uploaded_pdfs:/workspace/uploaded_pdfs
    depends_on:
      qdrant_service:
        condition: service_started
    restart: always

  qdrant_service:
    image: qdrant/qdrant:latest
    container_name: qdrant_node
    ports:
      - "6333:6333"
      - "6343:6343"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always